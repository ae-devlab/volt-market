<!doctype html>
<html lang="bg" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ панел · VoltMarket</title>
  </head>
  <body>
    <div id="site-nav"></div>
    <main class="container py-4">
      <h3 class="fw-bold mb-1"><i class="bi bi-shield-lock text-primary me-1"></i>Админ панел</h3>
      <p class="text-muted">Модерация на обяви и управление на потребители.</p>

      <ul class="nav nav-tabs mb-4" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#pane-pending" type="button" role="tab">
            <i class="bi bi-hourglass-split me-1"></i>Чакащи <span class="badge text-bg-warning ms-1" id="pending-count">0</span>
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pane-all" type="button" role="tab">
            <i class="bi bi-card-list me-1"></i>Всички обяви
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#pane-users" type="button" role="tab">
            <i class="bi bi-people me-1"></i>Потребители
          </button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="pane-pending" role="tabpanel">
          <div id="pending-list" class="row g-3"></div>
          <div id="pending-empty" class="empty-state d-none"><i class="bi bi-check2-all d-block mb-2"></i>Няма чакащи обяви.</div>
        </div>

        <div class="tab-pane fade" id="pane-all" role="tabpanel">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Обява</th><th>Продавач</th><th>Цена</th><th>Статус</th><th class="text-end">Действия</th>
                </tr>
              </thead>
              <tbody id="all-rows"></tbody>
            </table>
          </div>
        </div>

        <div class="tab-pane fade" id="pane-users" role="tabpanel">
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr><th>Потребител</th><th>Име</th><th>Роля</th><th class="text-end">Действия</th></tr>
              </thead>
              <tbody id="user-rows"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
