<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моят профил · VoltMarket</title>
  </head>
  <body>
    <div id="site-nav"></div>
    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <h3 class="fw-bold mb-4"><i class="bi bi-person text-primary me-1"></i>Моят профил</h3>
          <div id="error" class="alert alert-danger d-none" role="alert"></div>
          <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>

          <form id="profile-form" class="card card-body shadow-sm d-none" novalidate>
            <div class="d-flex align-items-center gap-3 mb-4">
              <img id="avatar-preview" src="" alt="Аватар" class="rounded-circle border" style="width: 84px; height: 84px; object-fit: cover" />
              <div>
                <label class="form-label mb-1" for="avatar">Профилна снимка</label>
                <input type="file" id="avatar" accept="image/*" class="form-control form-control-sm" />
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="username">Потребителско име</label>
                <input type="text" id="username" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="fullName">Име и фамилия</label>
                <input type="text" id="fullName" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="phone">Телефон</label>
                <input type="text" id="phone" class="form-control" />
              </div>
              <div class="col-md-6">
                <label class="form-label" for="location">Локация</label>
                <input type="text" id="location" class="form-control" />
              </div>
              <div class="col-12">
                <label class="form-label" for="bio">За мен</label>
                <textarea id="bio" class="form-control" rows="3"></textarea>
              </div>
            </div>
            <div class="mt-4">
              <button class="btn btn-primary" type="submit" id="submit-btn">
                <i class="bi bi-check-circle me-1"></i>Запази
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="/src/pages/profile.js"></script>
  </body>
</html>
