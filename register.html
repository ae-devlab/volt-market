<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация · VoltMarket</title>
  </head>
  <body>
    <div id="site-nav"></div>
    <main class="container py-5">
      <div class="auth-wrap">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h4 class="fw-bold mb-1"><i class="bi bi-person-plus text-primary me-1"></i>Регистрация</h4>
            <p class="text-muted small mb-4">Създай профил, за да публикуваш обяви и запазваш любими.</p>
            <div id="error" class="alert alert-danger d-none" role="alert"></div>
            <div id="success" class="alert alert-success d-none" role="alert"></div>
            <form id="register-form" novalidate>
              <div class="mb-3">
                <label class="form-label" for="username">Потребителско име</label>
                <input type="text" id="username" class="form-control" required autocomplete="username" />
              </div>
              <div class="mb-3">
                <label class="form-label" for="fullName">Име и фамилия</label>
                <input type="text" id="fullName" class="form-control" autocomplete="name" />
              </div>
              <div class="mb-3">
                <label class="form-label" for="email">Имейл</label>
                <input type="email" id="email" class="form-control" required autocomplete="email" />
              </div>
              <div class="mb-3">
                <label class="form-label" for="password">Парола</label>
                <input type="password" id="password" class="form-control" required minlength="6" autocomplete="new-password" />
                <div class="form-text">Минимум 6 символа.</div>
              </div>
              <button class="btn btn-primary w-100" type="submit" id="submit-btn">Създай профил</button>
            </form>
            <p class="text-center small mt-3 mb-0">Вече имаш профил? <a href="/login.html">Влез</a></p>
          </div>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <script type="module" src="/src/pages/register.js"></script>
  </body>
</html>
